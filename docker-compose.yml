services:
  configforge:
    build: .
    # ports:
    #   - "8000:8000"  # Development only; nginx handles external traffic in production
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
    environment:
      - CONFIGFORGE_ENV=${CONFIGFORGE_ENV:-production}
      - CONFIGFORGE_API_KEY=${CONFIGFORGE_API_KEY:-}
      - CONFIGFORGE_JWT_SECRET=${CONFIGFORGE_JWT_SECRET:-}
      - CONFIGFORGE_ENCRYPTION_KEY=${CONFIGFORGE_ENCRYPTION_KEY:-}
      - CORS_ORIGINS=http://localhost:8000
      # === PostgreSQL 后端（启用 postgres profile 时生效，T-5E-03） ===
      # 启动方式：docker compose --profile postgres up -d
      - CONFIGFORGE_STORAGE_BACKEND=${CONFIGFORGE_STORAGE_BACKEND:-json}
      - CONFIGFORGE_DATABASE_URL=${CONFIGFORGE_DATABASE_URL:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true

  # === PostgreSQL 数据库服务（可选，T-5E-03） ===
  # 启动方式：docker compose --profile postgres up -d
  # 需在 .env 中设置：
  #   CONFIGFORGE_STORAGE_BACKEND=postgresql
  #   CONFIGFORGE_DATABASE_URL=postgresql://configforge:configforge@postgres:5432/configforge
  postgres:
    image: postgres:17-alpine
    profiles: ["postgres"]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-configforge}
      - POSTGRES_USER=${POSTGRES_USER:-configforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-configforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"  # 仅开发调试时开放；生产环境不应暴露
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-configforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    depends_on:
      configforge:
        condition: service_healthy
    ports:
      - "80:80"
      # - "443:443"  # HTTPS 端口（启用 SSL 时取消注释）
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # === SSL 证书卷挂载（启用 HTTPS 时取消注释） ===
      # - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      # === Let's Encrypt webroot 验证目录（使用 certbot 时取消注释） ===
      # - ./certbot-webroot:/var/www/certbot:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
