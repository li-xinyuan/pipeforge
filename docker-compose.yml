services:
  configforge:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
    environment:
      - CONFIGFORGE_API_KEY=${CONFIGFORGE_API_KEY:-}
      - CONFIGFORGE_ENCRYPTION_KEY=${CONFIGFORGE_ENCRYPTION_KEY:-}
      - CORS_ORIGINS=http://localhost:8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
