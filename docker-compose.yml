services:
  configforge:
    build: .
    # ports:
    #   - "8000:8000"  # Development only; nginx handles external traffic in production
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
    environment:
      - CONFIGFORGE_ENV=${CONFIGFORGE_ENV:-production}
      - CONFIGFORGE_API_KEY=${CONFIGFORGE_API_KEY:-}
      - CONFIGFORGE_JWT_SECRET=${CONFIGFORGE_JWT_SECRET:-}
      - CONFIGFORGE_ENCRYPTION_KEY=${CONFIGFORGE_ENCRYPTION_KEY:-}
      - CORS_ORIGINS=http://localhost:8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    depends_on:
      configforge:
        condition: service_healthy
    ports:
      - "80:80"
      # - "443:443"  # HTTPS 端口（启用 SSL 时取消注释）
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # === SSL 证书卷挂载（启用 HTTPS 时取消注释） ===
      # - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      # === Let's Encrypt webroot 验证目录（使用 certbot 时取消注释） ===
      # - ./certbot-webroot:/var/www/certbot:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
