<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Gear -->
    <circle cx="256" cy="256" r="64"/>
    <circle cx="256" cy="256" r="20" fill="#ffffff" stroke="none"/>
    <!-- Gear teeth (8) -->
    <g stroke-width="28">
      <line x1="256" y1="140" x2="256" y2="172"/>
      <line x1="256" y1="340" x2="256" y2="372"/>
      <line x1="140" y1="256" x2="172" y2="256"/>
      <line x1="340" y1="256" x2="372" y2="256"/>
      <line x1="174" y1="174" x2="196" y2="196"/>
      <line x1="316" y1="316" x2="338" y2="338"/>
      <line x1="338" y1="174" x2="316" y2="196"/>
      <line x1="196" y1="316" x2="174" y2="338"/>
    </g>
    <!-- Pipeline flow dots -->
    <circle cx="96" cy="416" r="14" fill="#ffffff" stroke="none" opacity="0.9"/>
    <circle cx="160" cy="416" r="14" fill="#ffffff" stroke="none" opacity="0.6"/>
    <circle cx="224" cy="416" r="14" fill="#ffffff" stroke="none" opacity="0.4"/>
  </g>
</svg>
