name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run configforge tests
        run: uv run pytest configforge/tests/ -x -q

      - name: Run pipeforge tests
        run: uv run pytest src/tests/ -x -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: configforge-web/package-lock.json

      - name: Install dependencies
        working-directory: configforge-web
        run: npm ci

      - name: Run tests
        working-directory: configforge-web
        run: npx vitest run

      - name: Type check
        working-directory: configforge-web
        run: npx vue-tsc --noEmit
