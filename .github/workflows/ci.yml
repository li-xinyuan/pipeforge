name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run configforge tests
        run: uv run pytest configforge/tests/ -x -q

      - name: Run pipeforge tests
        run: uv run pytest src/tests/ -x -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: configforge-web/package-lock.json

      - name: Install dependencies
        working-directory: configforge-web
        run: npm ci

      - name: Run tests
        working-directory: configforge-web
        run: npx vitest run

      - name: Type check
        working-directory: configforge-web
        run: npx vue-tsc --noEmit

  docker-build:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: configforge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start container and health check
        run: |
          docker run -d --name configforge-ci -p 8000:8000 configforge:ci
          sleep 5
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/api/health; then
              echo "Health check passed"
              docker stop configforge-ci
              exit 0
            fi
            echo "Waiting for health check... attempt $i"
            sleep 3
          done
          echo "Health check failed"
          docker logs configforge-ci
          docker stop configforge-ci
          exit 1

  security-scan:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.13
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Scan Python dependencies
        run: pip-audit -r pyproject.toml || true
        continue-on-error: true
      - name: Scan frontend dependencies
        working-directory: configforge-web
        run: |
          npm ci
          npm audit --audit-level=high || true
        continue-on-error: true
